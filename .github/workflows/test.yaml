name: Test

on:
  # In-repo (maintainer) PRs run automatically. Fork PRs lack secret access and
  # must be triggered by a maintainer commenting /test (see test-slash-command.yaml),
  # which dispatches the repository_dispatch event below.
  pull_request:
    branches: [ main ]
  repository_dispatch:
    types: [test-command]
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit SHA or branch to test"
        required: false
        default: ""
  merge_group:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.build.image }}@${{ matrix.build.tag }})
    # Skip fork PRs on the pull_request event (they have no secret access). The
    # /test slash command path (repository_dispatch) runs them with secrets.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build:
          - { image: tedge, tag: latest }
          - { image: tedge-main, tag: latest }
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.client_payload.pull_request.head.sha || inputs.ref || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - uses: taiki-e/install-action@just

      - name: Build test bundles
        env:
          TEDGE_IMAGE: ${{ matrix.build.image }}
          TEDGE_TAG: ${{ matrix.build.tag }}
        run: just build-test-bundles

      - name: Upload bundles
        uses: actions/upload-artifact@v7
        with:
          name: bundles-${{ matrix.build.image }}
          path: tests/*.tar.gz
          retention-days: 1

  test:
    name: Test ${{ matrix.job.name }} (${{ matrix.build.image }}@${{ matrix.build.tag }})
    needs: build
    runs-on: ubuntu-latest
    permissions:
      # Required to publish system test results to the PR
      issues: write
      pull-requests: write
      contents: read
    environment:
      name: Test Auto
    env:
      TEST_IMAGE: ${{ matrix.job.image }}

    strategy:
      fail-fast: false
      matrix:
        build:
          - { image: tedge, tag: latest }
          - { image: tedge-main, tag: latest }
        job:
          # docker
          - { target: tedge-container-bundle, name: "docker v27", image: "docker:27-dind" }
          - { target: tedge-container-bundle, name: "docker v26", image: "docker:26-dind" }
          - { target: tedge-container-bundle, name: "docker v25", image: "docker:25-dind" }
          - { target: tedge-container-bundle, name: "docker v20", image: "docker:20-dind" }
          # podman
          - { target: tedge-container-bundle, name: "podman", image: debian-systemd-podman-cli }
          - { target: tedge-container-bundle, name: "podman v5", image: "podman-v5" }
          - { target: tedge-container-bundle, name: "podman v4", image: "podman-v4" }
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.client_payload.pull_request.head.sha || inputs.ref || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - uses: taiki-e/install-action@just

      - uses: reubenmiller/setup-go-c8y-cli@main
      - name: install c8y-tedge extension
        run: c8y extension install thin-edge/c8y-tedge

      - name: create .env file
        run: |
          touch .env

          echo 'C8Y_BASEURL="${{ secrets.C8Y_BASEURL }}"' >> .env
          echo 'C8Y_USER="${{ secrets.C8Y_USER }}"' >> .env
          echo 'C8Y_PASSWORD="${{ secrets.C8Y_PASSWORD }}"' >> .env

      - uses: actions/setup-python@v6
        with:
          python-version-file: tests/.python-version
          cache: 'pip'
          cache-dependency-path: |
            tests/requirements.txt

      - name: Download test bundles
        uses: actions/download-artifact@v8
        with:
          name: bundles-${{ matrix.build.image }}
          path: tests

      - name: Install dependencies
        run: |
          just venv
          just build-test-image

      - name: Run tests
        run: just test

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: reports-${{ matrix.job.name }}-${{ matrix.build.image }}@${{ matrix.build.tag }}
          path: output

      - name: Send report to commit
        uses: joonvena/robotframework-reporter-action@v2.5
        if: ${{ always() && (github.event_name == 'pull_request' || github.event_name == 'repository_dispatch') }}
        with:
          gh_access_token: ${{ secrets.GITHUB_TOKEN }}
          report_path: 'output'
          show_passed_tests: 'false'
          pull_request_id: ${{ github.event.pull_request.number || github.event.client_payload.pull_request.number }}
          sha: ${{ github.event.client_payload.pull_request.head.sha || github.sha }}

  tests-pass:
    name: Tests Pass
    needs: [build, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all matrix jobs passed
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "Build job failed: ${{ needs.build.result }}"
            exit 1
          fi
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "One or more matrix jobs failed: ${{ needs.test.result }}"
            exit 1
          fi
